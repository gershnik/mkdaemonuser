name: Test

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

jobs:
  main:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      # The tests create and delete real accounts, so they must run as root.
      # sudo resets PATH to a secure default (which on macOS can point at an
      # older /usr/bin/python3), so pass the resolved interpreter explicitly.
      - name: Run tests
        run: sudo "$(which python3)" test/test.py

  others:
    concurrency: ${{ matrix.remote_host }}
    runs-on: [self-hosted, server]
    strategy:
      fail-fast: false
      matrix:
        remote_host: 
          - alpine-3
          - freebsd-15
          - openbsd-7-5
          - netbsd-10
          - dragonfly
          - omnios
          - haiku
    steps:
    - name: Run remote build
      run: |
        "$RUNNER_TOOLS_PATH"/run-agent gh-${{ matrix.remote_host }} <<'EOF'
        set -e
        if [ ! -d work/mkdaemonuser ]; then
          git clone https://github.com/gershnik/mkdaemonuser.git work/mkdaemonuser
        fi
        cd work/mkdaemonuser
        git fetch --all
        git fetch -f --prune --tags
        git reset --hard ${{ github.sha }}
        if [[ '${{ matrix.remote_host }}' != 'haiku' ]]; then
            echo "${{ secrets.SUDO_PWD }}" | sudo -S -p '' test/test.py
        else
            tsudo "${{ secrets.SUDO_PWD }}" test/test.py
        fi
        EOF